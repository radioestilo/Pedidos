<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Pedidos - Bodega Virtual</title>
    <style>
        :root { --primary: #2c3e50; --success: #27ae60; --danger: #e74c3c; --bg: #f4f4f9; --warning: #f39c12; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); margin: 0; padding: 20px; }
        
        .header { background: var(--primary); color: white; padding: 15px 20px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .header-titulos h1 { margin: 0; font-size: 1.5rem; }
        .badge-pedidos { background: var(--danger); padding: 5px 15px; border-radius: 20px; font-weight: bold; font-size: 1.2rem; }

        /* Botón de Voz */
        .btn-voz { margin-top: 8px; padding: 6px 15px; border-radius: 20px; border: none; background: var(--warning); color: white; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 0.85rem; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .btn-voz.activada { background: var(--success); }

        #contenedor-pedidos { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }

        .tarjeta-pedido { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-left: 5px solid var(--success); position: relative; animation: aparecer 0.5s ease-out; }
        @keyframes aparecer { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        .pedido-fecha { font-size: 0.8rem; color: #888; text-align: right; margin-bottom: 10px; display: block; font-weight: bold; }
        .cliente-info h2 { margin: 0 0 5px 0; color: var(--primary); font-size: 1.2rem; }
        .cliente-info p { margin: 2px 0; font-size: 0.9rem; color: #555; }
        .ref-pago { background: #e8f8f5; color: #117a65; padding: 4px 8px; border-radius: 4px; font-family: monospace; font-weight: bold; }

        .caja-capture { margin-top: 15px; text-align: center; background: #fafafa; padding: 10px; border-radius: 8px; border: 1px dashed #ccc; }
        .caja-capture img { width: 100%; max-height: 300px; object-fit: contain; border-radius: 6px; cursor: zoom-in; border: 1px solid #eee; transition: all 0.3s ease; }
        
        .caja-capture img.ampliada {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; max-height: 100vh; object-fit: contain;
            background: rgba(0,0,0,0.9); z-index: 9999; padding: 20px; box-sizing: border-box; border-radius: 0; cursor: zoom-out;
        }

        .lista-productos { background: #f9f9f9; border-radius: 8px; padding: 10px; margin: 15px 0; }
        .item-producto { display: flex; justify-content: space-between; border-bottom: 1px solid #eee; padding: 5px 0; font-size: 0.9rem; }
        
        .totales { display: flex; justify-content: space-between; align-items: center; border-top: 2px dashed #eee; padding-top: 10px; margin-bottom: 15px; }
        .totales .usd { font-size: 1.3rem; font-weight: bold; color: var(--primary); }

        .btn-despachar { width: 100%; padding: 12px; background: var(--success); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-despachar:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-titulos">
            <h1>📦 Pedidos Entrantes</h1>
            <button id="btn-voz" class="btn-voz" onclick="toggleVoz()">🔇 Activar Alerta de Voz</button>
        </div>
        <div class="badge-pedidos" id="contador-pedidos">0</div>
    </div>

    <div id="contenedor-pedidos">
        <div style="grid-column: 1/-1; text-align:center; padding: 50px; color:#888;">Cargando sistema de pedidos...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD73Fli73cewNUX-Rj6YeZKlb97AcMrqL0",
            authDomain: "bodega-virtual-3e69b.firebaseapp.com",
            projectId: "bodega-virtual-3e69b",
            storageBucket: "bodega-virtual-3e69b.firebasestorage.app",
            messagingSenderId: "889100967352",
            appId: "1:889100967352:web:c626d959183115806d834d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const contenedor = document.getElementById('contenedor-pedidos');
        const contador = document.getElementById('contador-pedidos');

        // Variables para la voz
        let vozActivada = false;
        let cargaInicial = true; 

        // Función para activar/desactivar la voz
        window.toggleVoz = () => {
            vozActivada = !vozActivada;
            const btn = document.getElementById('btn-voz');
            if (vozActivada) {
                btn.innerHTML = "🔊 Alerta de Voz Activada";
                btn.classList.add('activada');
                hablar("Sistema de voz conectado y listo para recibir pedidos."); 
            } else {
                btn.innerHTML = "🔇 Activar Alerta de Voz";
                btn.classList.remove('activada');
            }
        };

        // Función para hablar
        function hablar(texto) {
            if ('speechSynthesis' in window && vozActivada) {
                const mensaje = new SpeechSynthesisUtterance(texto);
                mensaje.lang = 'es-ES'; // Acento en español
                mensaje.rate = 0.9; // Velocidad pausada y clara
                window.speechSynthesis.speak(mensaje);
            }
        }

        // Función para ordenar fechas
        function obtenerValorDeFecha(fechaStr) {
            if (!fechaStr) return 0;
            const numeros = fechaStr.match(/\d+/g);
            if (numeros && numeros.length >= 3) {
                let [d, m, y, h, min, s] = numeros.map(Number);
                h = h || 0; min = min || 0; s = s || 0;
                if (fechaStr.toLowerCase().includes('p') && h < 12) h += 12; 
                if (fechaStr.toLowerCase().includes('a') && h === 12) h = 0; 
                
                let mes = m, dia = d;
                if (d > 12) { mes = m; dia = d; }
                return new Date(y, mes - 1, dia, h, min, s).getTime();
            }
            return 0;
        }

        onSnapshot(collection(db, "pedidos"), (snapshot) => {
            if (snapshot.empty) {
                contenedor.innerHTML = '<div style="grid-column: 1/-1; text-align:center; padding: 50px; font-size:1.2rem; color:#666;">🎉 ¡No hay pedidos pendientes por despachar!</div>';
                contador.innerText = "0"; 
                cargaInicial = false;
                return;
            }

            // 1. Extraemos y ordenamos los pedidos (Los más nuevos primero)
            const arrayPedidos = [];
            snapshot.forEach((documento) => {
                arrayPedidos.push({ id: documento.id, data: documento.data() });
            });

            arrayPedidos.sort((a, b) => {
                return obtenerValorDeFecha(b.data.fecha) - obtenerValorDeFecha(a.data.fecha);
            });

            // 2. Renderizamos
            contenedor.innerHTML = "";
            arrayPedidos.forEach((pedido) => {
                const data = pedido.data;
                const totalBs = (data.total * (data.tasaAplicada || 1)).toFixed(2);

                let productosHTML = "";
                if(data.productos) {
                    data.productos.forEach(prod => {
                        productosHTML += `<div class="item-producto"><span><b>${prod.cantidad}x</b> ${prod.nombre}</span><span>$${(prod.precio * prod.cantidad).toFixed(2)}</span></div>`;
                    });
                }

                let imagenHTML = "";
                if (data.imagenBase64 && data.imagenBase64 !== "N/A" && data.imagenBase64.length > 50) {
                    imagenHTML = `
                        <div class="caja-capture">
                            <p style="font-size: 0.85rem; margin-top:0; color: var(--primary); font-weight:bold;">📸 Comprobante de pago:</p>
                            <img src="${data.imagenBase64}" alt="Capture" onclick="toggleImagen(this)">
                            <p style="font-size: 0.7rem; color: #888; margin-bottom:0;">(Toca la imagen para ampliar o cerrar)</p>
                        </div>`;
                } else if (data.metodo === 'C2P Banco de Venezuela') {
                    imagenHTML = `<div class="caja-capture" style="background:#eef5fb; border-color:#cce0ff;"><p style="font-size: 0.85rem; margin:0; color: var(--bdv); font-weight:bold;">💳 Pago C2P BDV Automático</p><small>No requiere comprobante manual.</small></div>`;
                } else {
                    imagenHTML = `<div class="caja-capture" style="background:#fdedec; border-color:#e74c3c;"><p style="font-size: 0.85rem; margin:0; color: var(--danger); font-weight:bold;">⚠️ No se adjuntó comprobante en este pedido.</p></div>`;
                }

                const tarjeta = document.createElement('div');
                tarjeta.className = 'tarjeta-pedido';
                tarjeta.innerHTML = `
                    <span class="pedido-fecha">📅 ${data.fecha || 'Reciente'}</span>
                    <div class="cliente-info">
                        <h2>👤 ${data.cliente}</h2>
                        <p><b>Cédula:</b> ${data.cedula}</p>
                        <p><b>Método:</b> ${data.metodo}</p>
                        <p>Ref: <span class="ref-pago">${data.pago}</span></p>
                    </div>
                    ${imagenHTML}
                    <div class="lista-productos">${productosHTML}</div>
                    <div class="totales">
                        <span class="usd">Total: $${parseFloat(data.total).toFixed(2)}</span>
                        <b style="color:var(--success)">Bs. ${totalBs}</b>
                    </div>
                    <button class="btn-despachar" onclick="despacharPedido('${pedido.id}')">✅ MARCAR COMO DESPACHADO</button>
                `;
                contenedor.appendChild(tarjeta);
            });
            
            contador.innerText = arrayPedidos.length;

            // 3. Revisamos si hay un pedido NUEVO para lanzar la alerta de voz detallada
            snapshot.docChanges().forEach((change) => {
                if (change.type === "added" && !cargaInicial) {
                    const data = change.doc.data();
                    
                    // Armamos la lista de productos hablada
                    let textoVoz = `Llegó un pedido de ${data.cliente}. `;
                    
                    if (data.productos && data.productos.length > 0) {
                        // Creamos un array de textos tipo: "2 Mayonesa", "1 Cerveza"
                        const listaHablada = data.productos.map(p => `${p.cantidad} ${p.nombre}`);
                        textoVoz += `Los productos son: ${listaHablada.join(", ")}.`;
                    }
                    
                    // Ejecutamos la lectura
                    hablar(textoVoz);
                }
            });

            cargaInicial = false; 
        });

        // Función para agrandar o achicar la imagen
        window.toggleImagen = (img) => {
            img.classList.toggle('ampliada');
        };

        window.despacharPedido = async (id) => {
            if(confirm("¿Seguro que ya entregaste este pedido? Se borrará de la lista permanentemente.")) {
                try { await deleteDoc(doc(db, "pedidos", id)); } catch (e) { alert("Error: " + e); }
            }
        };
    </script>
</body>
</html>
